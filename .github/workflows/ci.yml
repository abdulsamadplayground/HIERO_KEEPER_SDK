name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  dco-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: DCO Sign-Off Check
        run: |
          BASE_SHA=${{ github.event.pull_request.base.sha }}
          HEAD_SHA=${{ github.event.pull_request.head.sha }}
          MISSING=""
          for COMMIT in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            if ! git log --format='%B' -n 1 "$COMMIT" | grep -iq "^Signed-off-by:"; then
              MISSING="$MISSING $COMMIT"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "The following commits are missing a DCO sign-off:"
            for C in $MISSING; do
              echo "  - $C: $(git log --format='%s' -n 1 "$C")"
            done
            echo ""
            echo "Add a sign-off with: git commit -s --amend"
            exit 1
          fi
          echo "All commits have DCO sign-off."
